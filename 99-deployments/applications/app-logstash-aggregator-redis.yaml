apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: logstash-aggregator-redis
spec:
  generators:
  - clusters:
      selector:
        matchLabels:
          custom: "true"
  template:
    metadata:
      name: 'logstash-aggregator-redis-{{name}}'
    spec:
      project: "default"
      source:
        repoURL: https://github.com/wintech-thai/please-protect-data-plane.git
        targetRevision: "{{name}}"
        path: '99-deployments/manifests/logstash-aggregator-redis'
        helm:
          ignoreMissingValueFiles: true
          valueFiles:
            - values.yaml
            - values-{{name}}.yaml
            - values-local.yaml
      destination:
        name: in-cluster
        namespace: logstash-aggregator-redis
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
