apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: logstash-transformer
spec:
  generators:
  - clusters:
      selector:
        matchLabels:
          custom: "true"
  template:
    metadata:
      name: 'logstash-transformer-{{name}}'
    spec:
      project: "default"
      source:
        repoURL: https://github.com/rtaf-soc/rtarf-dfn-apps.git
        targetRevision: "{{name}}" #Based on environment
        path: '99-deployments/manifests/logstash-transformer'
        helm:
          ignoreMissingValueFiles: true
          valueFiles:
            - values.yaml
            - values-{{name}}.yaml
            - values-local.yaml
      destination:
        name: in-cluster
        namespace: logstash-transformer
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true

