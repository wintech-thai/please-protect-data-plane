redis:
  fullnameOverride: redis-etl
  architecture: standalone
  auth:
    enabled: false
  image:
    repository: bitnamilegacy/redis
    # tag: 
  master:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: "100m"
        memory: "2.5Gi"
      limits:
        cpu: "500m"
        memory: "4Gi"
    configuration: |-
      maxmemory 3400mb
      maxmemory-policy noeviction
  metrics:
    enabled: true
    image:
      repository: bitnamilegacy/redis-exporter
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-crds
