apiVersion: apps/v1
kind: Deployment
metadata:
  name: interface-manager
spec:
  replicas: {{ .Values.ifm.replica }}
  revisionHistoryLimit: 1
  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: interface-manager

  template:
    metadata:
      labels:
        app: interface-manager

    spec:
      hostNetwork: true
      containers:
      - name: interface-manager
        image: {{ .Values.ifm.image.name }}:{{ .Values.ifm.image.tag }}
        imagePullPolicy: Always

        command:
          - ruby
          - /app/interface-manager.rb

        ports:
        - containerPort: 8080

        resources:
          requests:
            memory: "{{ .Values.ifm.resources.requests.memory }}"
            cpu: "{{ .Values.ifm.resources.requests.cpu }}"
          limits:
            memory: "{{ .Values.ifm.resources.limits.memory }}"
            cpu: "{{ .Values.ifm.resources.limits.cpu }}"

        securityContext:
          runAsUser: 0

        volumeMounts:
        - name: sys
          mountPath: /sys
          readOnly: true

        - name: data
          mountPath: /data

        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10

      volumes:
      - name: sys
        hostPath:
          path: /sys

      - name: data
        hostPath:
          path: /data/interface-manager
          type: DirectoryOrCreate
