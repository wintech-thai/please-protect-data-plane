apiVersion: batch/v1
kind: Job
metadata:
  name: init-admin-user
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: OnFailure

      #################################################
      # 1️⃣ รอ Elasticsearch ให้พร้อมก่อน
      #################################################
      initContainers:
        - name: wait-for-es
          image: curlimages/curl:8.5.0
          command:
            - /bin/sh
            - -c
            - |
              echo "Using ES_URL=$ES_URL"
              echo "Waiting for Elasticsearch index arkime_sessions..."

              for i in $(seq 1 30); do
                if curl -k -s -f -u "$ES_USER:$ES_PASSWORD" \
                  "$ES_URL/_cluster/health?wait_for_status=yellow&timeout=5s" >/dev/null; then
                  echo "Elasticsearch cluster is ready"
                  exit 0
                fi

                echo "Retry $i/30 - ES not ready"
                sleep 5
              done

              echo "Elasticsearch not ready after retries"
              exit 1

          env:
            - name: ES_URL
              value: "https://es-censor-es-http.elasticsearch.svc.cluster.local:9200"

            - name: ES_USER
              valueFrom:
                secretKeyRef:
                  name: es-basic-authen
                  key: elasticsearchUser

            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: es-basic-authen
                  key: elasticsearchPassword

      #################################################
      # 2️⃣ สร้าง Arkime admin user
      #################################################
      containers:
        - name: create-admin
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              echo "Checking if Arkime admin exists..."

              if /opt/arkime/bin/arkime_add_user.sh --list 2>/dev/null | grep -q "$ARKIME_USER"; then
                echo "Admin already exists"
                exit 0
              fi

              echo "Creating Arkime admin user..."
              /opt/arkime/bin/arkime_add_user.sh \
                "$ARKIME_USER" \
                "Admin User" \
                "$ARKIME_PASSWORD" \
                --admin

              echo "Admin user created successfully"

          env:
            - name: ARKIME_USER
              valueFrom:
                secretKeyRef:
                  name: init-user-secret
                  key: ARKIME_USER

            - name: ARKIME_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: init-user-secret
                  key: ARKIME_PASSWORD

          volumeMounts:
            - name: arkime-config
              mountPath: /opt/arkime/etc/
      volumes:
      - name: arkime-config
        configMap:
          name: {{ include "arkime.fullname" . }}-config-map
