apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alm-ing
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP  
    kubernetes.io/ingress.class: "nginx"
spec:
  tls:
    - hosts:
      - {{ .Values.domainAlm }}
      #secretName: grafana-loki-cert
  rules:
    - host: {{ .Values.domainAlm }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-alertmanager
                port:
                  number: 9093
