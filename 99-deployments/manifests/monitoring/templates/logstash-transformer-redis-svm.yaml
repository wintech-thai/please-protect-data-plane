apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: logstash-transformer-redis
  labels:
    release: kube-prometheus-crds  # เพื่อให้ Prometheus มองเห็น
spec:
  namespaceSelector:
    matchNames:
      - logstash-transformer-redis

  selector:
    matchLabels:
      app: logstash-transformer-redis

  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
