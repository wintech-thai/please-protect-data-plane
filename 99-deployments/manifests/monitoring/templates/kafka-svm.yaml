apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kafka-svm
  labels:
    release: kube-prometheus-crds  # เพื่อให้ Prometheus มองเห็น
spec:
  namespaceSelector:
    matchNames:
      - kafka

  selector:
    matchLabels:
      app.kubernetes.io/name: kafka

  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 15s
