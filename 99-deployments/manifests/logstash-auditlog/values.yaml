
logstash-auditlog:
  enabled: true
  antiAffinity: soft

  fullnameOverride: logstash-auditlog
  replicas: 2
  image: asia-southeast1-docker.pkg.dev/its-artifact-commons/utils/logstash
  imageTag: v8.15.1-3

  extraEnvs:
    - name: DUMMY_FOR_RESTART #If need to restart pod manually then change this
      value: "000"

    - name: LS_JAVA_OPTS
      value: "-Xmx512m -Xms512m"

    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name

    - name: ES_USER
      valueFrom:
        secretKeyRef:
          name: es-basic-authen
          key: ES_USER

    - name: ES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: es-basic-authen
          key: ES_PASSWORD

  service:
    ports:
      - name: http-input
        port: 8080
        targetPort: 8080
        protocol: TCP

  logstashConfig:
    logstash.yml: |
      http.host: "0.0.0.0"
      pipeline.ecs_compatibility: "disabled"

  extraVolumeMounts:
    - name: scripts
      mountPath: /scripts/
      readOnly: true

  extraVolumes:
    - name: scripts
      configMap:
        name: auditlog-cm


  logstashPipeline:
    logstash.conf: |
      input {
        http {
          id => "http_input"
          codec => "json_lines"
          port => "8080"
        }
      }

      filter {
        ruby {
          path => "/scripts/auditlog.rb"
          script_params => {}
        }

        geoip {
          source => "[data][ClientIp]"
        }

        prune {
          interpolate => true
          whitelist_names => [ "type", "index_name", "@timestamp", "data", "geo" ]
        }
      }

      output {
        #stdout { codec => json_lines }

        elasticsearch {
          hosts => [ "https://es-censor-es-http.elasticsearch.svc.cluster.local:9200" ]
          ssl_certificate_verification => false
          user => "${ES_USER}"
          password => "${ES_PASSWORD}"
          action => "create"

          ecs_compatibility => "v8"
          http_compression => "true"

          index => "%{[index_name]}"
          template_overwrite => "true"
          timeout => "0.5"
        }
      }