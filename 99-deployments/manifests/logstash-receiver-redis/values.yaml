logstash-beat-receiver-redis:
  enabled: true
  antiAffinity: soft

  fullnameOverride: logstash-beat-receiver-redis
  replicas: 1
  image: asia-southeast1-docker.pkg.dev/its-artifact-commons/utils/logstash
  imageTag: v8.15.1-3
  resources:
    requests:
      cpu: "250m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

  livenessProbe:
    exec:
      command:
        - /bin/sh
        - -c
        - |
          CURR=$(curl -sf -m 5 http://localhost:9600/_node/stats/pipelines/main | /usr/share/logstash/bin/ruby -rjson -e 'print JSON.parse(STDIN.read)["events"]["in"]' 2>/dev/null)
          if [ -z "$CURR" ]; then echo "cannot reach logstash API"; exit 1; fi
          STATE=/tmp/.pipeline_liveness
          PREV=$(cat "$STATE.count" 2>/dev/null || echo -1)
          echo "$CURR" > "$STATE.count"
          NOW=$(date +%s)
          if [ "$CURR" != "$PREV" ]; then
            echo "$NOW" > "$STATE.since"
            exit 0
          fi
          SINCE=$(cat "$STATE.since" 2>/dev/null || echo "$NOW")
          STALL=$((NOW - SINCE))
          if [ "$STALL" -gt 300 ]; then
            echo "pipeline stalled ${STALL}s, events.in stuck at $CURR"
            exit 1
          fi
          exit 0
    initialDelaySeconds: 180
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 1
    successThreshold: 1

  service:
    type: NodePort
    ports:
    - port: 5044
      protocol: TCP
      targetPort: 5044
      nodePort: 30045
      name: beats
    - port: 9198
      protocol: TCP
      targetPort: 9198
      name: metrics

  extraContainers:
    - name: logstash-exporter
      image: bonniernews/logstash_exporter:latest
      args:
        - "--logstash.endpoint=http://localhost:9600"
      ports:
        - name: metrics
          containerPort: 9198

  extraInitContainers:
    - name: download-geoip
      image: curlimages/curl:8.8.0
      command:
        - sh
        - -c
        - |
          curl -L -o /tmp/geoip/GeoLite2-City.mmdb \
            http://geoip-sync.pp-system.svc.cluster.local/GeoLite2-City.mmdb
      volumeMounts:
        - name: geoip-db
          mountPath: /tmp/geoip

  extraEnvs:
    - name: REDIS_ETL_HOST
      value: "redis-etl-master.redis-etl.svc.cluster.local"

    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name

  logstashJavaOpts: "-Xms1g -Xmx1g"

  logstashConfig:
    logstash.yml: |
      http.host: "0.0.0.0"
      pipeline.ecs_compatibility: "disabled"
      http.port: 9600
      pipeline.workers: 1 # shared Redis client, not thread-safe — scale via replicas, not workers

  extraVolumeMounts:
    - name: scripts
      mountPath: /scripts/
      readOnly: true
    - name: geoip-db
      mountPath: /tmp/geoip
      readOnly: true

  extraVolumes:
    - name: scripts
      configMap:
        name: receiver-beat-cm
    - name: geoip-db
      emptyDir: {}

  logstashPipeline:
    logstash.conf: |
      input {
        beats {
          port => 5044
          codec => "json"
          type => "log"
        }
      }

      filter {
        ruby {
          path => "/scripts/receiver-beat.rb"
          script_params => {}
        }

        if [network][direction] == "outbound" {
          geoip {
            source => "[destination][ip]"
            target => "[destination][geoip]"
            database => "/tmp/geoip/GeoLite2-City.mmdb"
          }
        }

        if [network][direction] == "external" {
          geoip {
            source => "[source][ip]"
            target => "[source][geoip]"
            database => "/tmp/geoip/GeoLite2-City.mmdb"
          }
        }

        ruby {
          init => '
            require "redis"
            require "json"

            STREAM   = "received-topic-beat"
            GROUP    = "for-transformer"
            MAXLEN   = 180_000

            def connect_with_retry(host, port)
              attempt = 0
              begin
                r = Redis.new(host: host, port: port, timeout: 5, reconnect_attempts: 1)
                r.ping
                r
              rescue Redis::BaseConnectionError => e
                attempt += 1
                if attempt >= 30
                  STDOUT.puts("ERROR receiver: Redis unreachable after #{attempt} attempts (#{e.message}), failing")
                  raise
                end
                wait = [2 ** [attempt, 6].min, 30].min
                STDOUT.puts("WARN receiver: Redis connect failed (#{e.message}), retry in #{wait}s (#{attempt}/30)")
                sleep wait
                retry
              end
            end

            $r = connect_with_retry(ENV["REDIS_ETL_HOST"], 6379)
            begin
              $r.xgroup(:create, STREAM, GROUP, "$", mkstream: true)
            rescue Redis::CommandError => e
              raise e unless e.message.include?("BUSYGROUP")
            rescue Redis::BaseConnectionError => e
              STDOUT.puts("WARN receiver: xgroup create failed (#{e.message}), retrying")
              sleep 2
              retry
            end
          '
          code => '
            begin
              payload = event.to_json
              $r.xadd(STREAM, { "data" => payload }, id: "*", maxlen: MAXLEN, approximate: true)
            rescue Redis::BaseConnectionError => e
              STDOUT.puts("WARN receiver: Redis unavailable, dropping event (#{e.message})")
              sleep 1
            end
            event.cancel
          '
        }
      }

      output {}
