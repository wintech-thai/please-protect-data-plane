domain: kafka-ui.rtarf-censor.dev-hubs.com

kafka-ui:
  enabled: true
  fullnameOverride: kafka-ui
  envs:
    config:
      KAFKA_CLUSTERS_0_NAME: kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      #KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: SCRAM-SHA-512
      #KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_CLUSTERS_0_READONLY: "false"
      AUTH_TYPE: "DISABLED"
      SECURITY_BASIC_ENABLED: "true"
      SERVER_SERVLET_CONTEXT_PATH: "/tools/kafka-ui"

kafka:
  enabled: true
  fullnameOverride: kafka
  autoCreateTopicsEnable: true

  controller:
    heapOpts: "-Xms1g -Xmx1g"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
        #ephemeral-storage: 1Gi
      limits:
        cpu: 2
        memory: 2Gi
        #ephemeral-storage: 2Gi

  metrics:
    jmx:
      enabled: true
      containerPorts:
        metrics: 5556
      image:
        repository: bitnamilegacy/jmx-exporter
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
          
    service:
      ports:
        metrics: 5556

    serviceMonitor:
      enabled: false   # จัดการเอง

  kraft:
    enabled: true

  zookeeper:
    enabled: false

  replicaCount: 3

  controller:
    replicaCount: 3

  listeners:
    client:
      protocol: PLAINTEXT
    interbroker:
      protocol: PLAINTEXT
    controller:
      protocol: PLAINTEXT

  persistence:
    enabled: true
    size: 10Gi

  image:
    repository: bitnamilegacy/kafka


