logstash-transformer-redis:
  enabled: true
  antiAffinity: soft

  fullnameOverride: logstash-transformer-redis
  replicas: 1
  image: asia-southeast1-docker.pkg.dev/its-artifact-commons/utils/logstash
  imageTag: v8.15.1-3
  resources:
    requests:
      cpu: "250m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"
  service:
    type: ClusterIP
    ports:
    - port: 9198
      protocol: TCP
      targetPort: 9198
      name: metrics

  extraEnvs:
    - name: REDIS_ETL_HOST
      value: "redis-etl-master.redis-etl.svc.cluster.local"

    - name: REDIS_HOST
      value: "redis-master.redis.svc.cluster.local"

    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name

  logstashJavaOpts: "-Xms1g -Xmx1g"

  logstashConfig:
    logstash.yml: |
      http.host: "0.0.0.0"
      pipeline.ecs_compatibility: "disabled"
      http.port: 9600

  extraVolumeMounts:
    - name: scripts
      mountPath: /scripts/
      readOnly: true

  extraVolumes:
    - name: scripts
      configMap:
        name: transformer-cm

  logstashPipeline:
    logstash.conf: |
      input {
        generator {
          count => 0
        }
      }

      filter {
        ruby {
          init => '
            require "redis"
            require "json"

            IN_STREAM  = "received-topic-beat"
            IN_GROUP   = "for-transformer"
            CONSUMER   = "transformer-#{ENV["POD_NAME"]}"
            OUT_STREAM = "transformed-topic-beat"
            OUT_GROUP  = "for-aggregator-ioc"
            MAXLEN     = 100_000

            $r_in = Redis.new(host: ENV["REDIS_ETL_HOST"], port: 6379)
            begin
              $r_in.xgroup(:create, IN_STREAM, IN_GROUP, "$", mkstream: true)
            rescue Redis::CommandError => e
              raise e unless e.message.include?("BUSYGROUP")
            end
            begin
              $r_in.xgroup(:create, OUT_STREAM, OUT_GROUP, "$", mkstream: true)
            rescue Redis::CommandError => e
              raise e unless e.message.include?("BUSYGROUP")
            end
          '
          code => '
            entries = $r_in.xreadgroup(IN_GROUP, CONSUMER, IN_STREAM, ">", count: 1, block: 1000)
            if entries && entries[IN_STREAM] && !entries[IN_STREAM].empty?
              id, fields = entries[IN_STREAM].first
              new_ev = LogStash::Event.new(JSON.parse(fields["data"]))
              event.overwrite(new_ev)
              $r_in.xack(IN_STREAM, IN_GROUP, id)
            else
              event.cancel
            end
          '
        }

        if ![@metadata][cancelled] {
          ruby {
            path => "/scripts/transformer.rb"
            script_params => {}
          }

          ruby {
            init => '
              require "redis"
              require "json"
              $r_out = Redis.new(host: ENV["REDIS_ETL_HOST"], port: 6379)
            '
            code => '
              if event.get("cust_ts_yyyy")
                payload = event.to_json
                $r_out.xadd("transformed-topic-beat", { "data" => payload }, id: "*", maxlen: 100_000, approximate: true)
              end
            '
          }
        }
      }

      output {}
