logstash-transformer-redis:
  enabled: true
  antiAffinity: soft

  fullnameOverride: logstash-transformer-redis
  replicas: 1
  image: asia-southeast1-docker.pkg.dev/its-artifact-commons/utils/logstash
  imageTag: v8.15.1-3
  resources:
    requests:
      cpu: "250m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  service:
    type: ClusterIP
    ports:
    - port: 9198
      protocol: TCP
      targetPort: 9198
      name: metrics

  extraContainers:
    - name: logstash-exporter
      image: bonniernews/logstash_exporter:latest
      args:
        - "--logstash.endpoint=http://localhost:9600"
      ports:
        - name: metrics
          containerPort: 9198

  extraEnvs:
    - name: REDIS_ETL_HOST
      value: "redis-etl-master.redis-etl.svc.cluster.local"

    - name: REDIS_HOST
      value: "redis-master.redis.svc.cluster.local"

    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name

  logstashJavaOpts: "-Xms1g -Xmx1g"

  logstashConfig:
    logstash.yml: |
      http.host: "0.0.0.0"
      pipeline.ecs_compatibility: "disabled"
      http.port: 9600
      pipeline.workers: 1 # shared Redis client, not thread-safe — scale via replicas, not workers

  extraVolumeMounts:
    - name: scripts
      mountPath: /scripts/
      readOnly: true

  extraVolumes:
    - name: scripts
      configMap:
        name: transformer-cm

  logstashPipeline:
    logstash.conf: |
      input {
        generator {
          count => 0
        }
      }

      filter {
        ruby {
          init => '
            require "redis"
            require "json"

            IN_STREAM  = "received-topic-beat"
            IN_GROUP   = "for-transformer"
            CONSUMER   = "transformer-#{ENV["POD_NAME"]}"
            OUT_STREAM = "transformed-topic-beat"
            OUT_GROUP  = "for-aggregator-ioc"
            MAXLEN     = 180_000

            def connect_with_retry(host, port)
              attempt = 0
              begin
                r = Redis.new(host: host, port: port)
                r.ping
                r
              rescue Redis::BaseConnectionError => e
                attempt += 1
                if attempt >= 30
                  STDOUT.puts("ERROR transformer: Redis unreachable after #{attempt} attempts (#{e.message}), failing")
                  raise
                end
                wait = [2 ** [attempt, 6].min, 30].min
                STDOUT.puts("WARN transformer: Redis connect failed (#{e.message}), retry in #{wait}s (#{attempt}/30)")
                sleep wait
                retry
              end
            end

            def ensure_group(r, stream, group, tag)
              begin
                r.xgroup(:create, stream, group, "$", mkstream: true)
              rescue Redis::CommandError => e
                raise e unless e.message.include?("BUSYGROUP")
              rescue Redis::BaseConnectionError => e
                STDOUT.puts("WARN transformer: xgroup create (#{tag}) failed (#{e.message}), retrying")
                sleep 2
                retry
              end
            end

            $r_in = connect_with_retry(ENV["REDIS_ETL_HOST"], 6379)
            ensure_group($r_in, IN_STREAM, IN_GROUP, "in")
            ensure_group($r_in, OUT_STREAM, OUT_GROUP, "out")
          '
          code => '
            begin
              entries = $r_in.xreadgroup(IN_GROUP, CONSUMER, IN_STREAM, ">", count: 1, block: 1000)
              if entries && entries[IN_STREAM] && !entries[IN_STREAM].empty?
                id, fields = entries[IN_STREAM].first
                new_ev = LogStash::Event.new(JSON.parse(fields["data"]))
                event.overwrite(new_ev)
                $r_in.xack(IN_STREAM, IN_GROUP, id)
              else
                event.cancel
              end
            rescue Redis::BaseConnectionError => e
              STDOUT.puts("WARN transformer: Redis unavailable, skipping tick (#{e.message})")
              sleep 1
              event.cancel
            end
          '
        }

        if ![@metadata][cancelled] {
          ruby {
            path => "/scripts/transformer.rb"
            script_params => {}
          }

          ruby {
            init => '
              require "redis"
              require "json"

              def connect_with_retry(host, port)
                attempt = 0
                begin
                  r = Redis.new(host: host, port: port)
                  r.ping
                  r
                rescue Redis::BaseConnectionError => e
                  attempt += 1
                  if attempt >= 30
                    STDOUT.puts("ERROR transformer-out: Redis unreachable after #{attempt} attempts (#{e.message}), failing")
                    raise
                  end
                  wait = [2 ** [attempt, 6].min, 30].min
                  STDOUT.puts("WARN transformer-out: Redis connect failed (#{e.message}), retry in #{wait}s (#{attempt}/30)")
                  sleep wait
                  retry
                end
              end

              $r_out = connect_with_retry(ENV["REDIS_ETL_HOST"], 6379)
            '
            code => '
              if event.get("cust_ts_yyyy")
                begin
                  payload = event.to_json
                  $r_out.xadd("transformed-topic-beat", { "data" => payload }, id: "*", maxlen: 180_000, approximate: true)
                rescue Redis::BaseConnectionError => e
                  STDOUT.puts("WARN transformer-out: Redis unavailable, dropping event (#{e.message})")
                  sleep 1
                end
              end
            '
          }
        }
      }

      output {}
