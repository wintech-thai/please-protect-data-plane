apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
data:
  filebeat.yml: |
    filebeat.inputs:
    - type: filestream
      id: suricata-eve
      paths:
        - {{ .Values.suricataEth0.logDir }}/eve.json

      parsers:
        - ndjson:
            overwrite_keys: true
            add_error_key: true

      fields:
        event.module: suricata
        event.dataset: suricata.eve
      fields_under_root: true

      processors:
        - add_host_metadata: ~
        - add_observer_metadata:
            netinfo.enabled: true
        - add_cloud_metadata: ~

    logging.level: info
    logging.to_files: true
    logging.files:
      path: /var/log/filebeat
      name: filebeat.log
      keepfiles: 7
      permissions: 0644

    output.logstash:
      hosts: ["{{ .Values.suricataEth0.logstash.host }}:{{ .Values.suricataEth0.logstash.port }}"]
