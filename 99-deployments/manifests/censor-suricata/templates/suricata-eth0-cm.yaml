apiVersion: v1
kind: ConfigMap
metadata:
  name: suricata-config
data:
  {{ .Values.suricataEth0.suricataConfigName }}: |
    %YAML 1.1
    ---

    vars:
      address-groups:
        HOME_NET: "[10.0.0.0/8,192.168.0.0/16]"
        EXTERNAL_NET: "!$HOME_NET"

      port-groups:
        HTTP_PORTS: "80"
        HTTPS_PORTS: "443"

    # ======================
    # Capture
    # ======================
    af-packet:
      - interface: eth0
        cluster-type: cluster_flow
        cluster-id: 99
        defrag: yes
        use-mmap: yes
        tpacket-v3: yes

      - interface: ens4
        cluster-type: cluster_flow
        cluster-id: 20
        defrag: yes
        use-mmap: yes
        tpacket-v3: no

      - interface: ens5
        cluster-type: cluster_flow
        cluster-id: 21
        defrag: yes
        use-mmap: yes
        tpacket-v3: no
    # ======================
    # Rules
    # ======================
    default-rule-path: /var/lib/suricata/rules

    rule-files:
      - suricata.rules
      - local.rules

    # ======================
    # Logging / Outputs
    # ======================
    outputs:

      # ❌ ปิด fast.log
      - fast:
          enabled: no
          filename: {{ .Values.suricataEth0.logDir }}/suricata.fast.log

      # ✅ EVE JSON
      - eve-log:
          enabled: yes
          filetype: regular
          filename: {{ .Values.suricataEth0.logDir }}/eve.json

          # ⭐ สำคัญมาก ใช้ correlate Zeek / Arkime
          community-id: true

          types:
            - alert

    # ======================
    # Performance
    # ======================
    threading:
      set-cpu-affinity: no

    stream:
      memcap: 1gb
      checksum-validation: yes

    flow:
      memcap: 256mb
      hash-size: 65536
      emergency-recovery: 30

    # ======================
    # Detection
    # ======================
    detect:
      profile: medium

    # ======================
    # Logging level
    # ======================
    logging:
      default-log-level: notice

    # ======================
    # App Layer
    # ======================
    app-layer:
      protocols:
        dns:
          enabled: yes
        http:
          enabled: yes
        tls:
          enabled: yes
