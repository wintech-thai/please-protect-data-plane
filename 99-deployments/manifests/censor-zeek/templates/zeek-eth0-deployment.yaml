apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.zeekEth0.fullnameOverride }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zeek
  template:
    metadata:
      labels:
        app: zeek
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      # ======================
      # Init container
      # ======================
      initContainers:
        - name: fetch-interfaces
          image: curlimages/curl:8.5.0
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -e

              IFACE_API="http://interface-manager-service.pp-system.svc.cluster.local/interfaces/enabled"
              HEALTH_API="http://interface-manager-service.pp-system.svc.cluster.local/healthz"

              echo "[*] Waiting for interface-manager..."

              until curl -sf $HEALTH_API >/dev/null; do
                echo "[*] interface-manager not ready..."
                sleep 2
              done

              echo "[*] Fetching interfaces..."

              IFACES=""
              while [ -z "$IFACES" ]; do
                IFACES=$(curl -s $IFACE_API)

                if [ -z "$IFACES" ]; then
                  echo "[*] No interfaces enabled yet..."
                  sleep 2
                fi
              done

              echo "$IFACES" > /shared/interfaces.txt

              echo "[*] Interfaces saved:"
              cat /shared/interfaces.txt

          volumeMounts:
            - name: iface-data
              mountPath: /shared

      containers:
        # ======================
        # Filebeat sidecar
        # ======================
        - name: filebeat
          image: docker.elastic.co/beats/filebeat:8.12.0
          imagePullPolicy: IfNotPresent

          args:
            - "-e"
            - "-c"
            - "/usr/share/filebeat/filebeat.yml"

          env:
            - name: DUMMY
              value: "{{ .Values.zeekEth0.dummyVar }}"

          securityContext:
            runAsUser: 0

          volumeMounts:
            - name: zeek-logs
              mountPath: {{ .Values.zeekEth0.logDir }}
              readOnly: true

            - name: filebeat-config
              mountPath: /usr/share/filebeat/filebeat.yml
              subPath: filebeat.yml

            - name: filebeat-modules
              mountPath: /usr/share/filebeat/modules.d
              readOnly: true

        # ======================
        # Zeek
        # ======================
        - name: zeek
          image: zeek/zeek:8.0.4
          imagePullPolicy: IfNotPresent

          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_RAW
                - NET_ADMIN

          command:
            - /bin/sh
            - -c
          args:
            - |
              set -e

              # กำหนด Path หลักของ Zeek
              ZEEK_BASE="/usr/local/zeek"
              # กำหนดที่เก็บ Log ตามที่คุณตั้งค่าใน Helm
              export ZEEK_LOG_DIR={{ .Values.zeekEth0.logDir }}/current

              mkdir -p $ZEEK_LOG_DIR
              echo "Log dir = $ZEEK_LOG_DIR"

              IFACES=$(cat /shared/interfaces.txt)

              # 1. สร้าง node.cfg ใหม่ทุกครั้งที่ Start (เพื่อให้ Dynamic ตาม interface ที่พบ)
              echo "[manager]
              type=manager
              host=localhost

              [proxy-1]
              type=proxy
              host=localhost" > $ZEEK_BASE/etc/node.cfg

              count=1
              for i in $IFACES; do
                echo "[worker-$count]
              type=worker
              host=localhost
              interface=af_packet::$i" >> $ZEEK_BASE/etc/node.cfg
                count=$((count+1))
              done

              # 2. ปรับแต่ง zeekctl.cfg ให้ Log ไปลงที่ Volume ของคุณ
              # ใช้ sed เพื่อเปลี่ยนค่า LogDir ในไฟล์คอนฟิกหลัก
              sed -i "s|^LogDir =.*|LogDir = $ZEEK_LOG_DIR|g" $ZEEK_BASE/etc/zeekctl.cfg

              $ZEEK_BASE/bin/zeekctl cleanup # ล้างสถานะเก่าที่อาจค้างอยู่

              # 3. สั่ง Deploy และรัน
              echo "[*] Deploying Zeek with interfaces: $IFACES"
              $ZEEK_BASE/bin/zeekctl install

              # ใช้คำสั่ง cron เพื่อให้ Zeek ทำการหมุนไฟล์ Log และเช็คสถานะตัวเองเรื่อยๆ
              $ZEEK_BASE/bin/zeekctl cron enable

              # เริ่มทำงานในโหมด foreground เพื่อให้ Container ไม่จบการทำงาน
              exec $ZEEK_BASE/bin/zeekctl start

              echo "[*] Zeek is running..."
              # รั้ง Process ไว้ไม่ให้ Completed
              exec tail -f $ZEEK_BASE/logs/current/conn.log

          resources:
            requests:
              cpu: {{ .Values.zeekEth0.resources.requests.cpu }}
              memory: {{ .Values.zeekEth0.resources.requests.memory }}
            limits:
              cpu: {{ .Values.zeekEth0.resources.limits.cpu }}
              memory: {{ .Values.zeekEth0.resources.limits.memory }}

          volumeMounts:
            - name: zeek-logs
              mountPath: {{ .Values.zeekEth0.logDir }}

            - name: config-volume
              mountPath: /etc/zeek/site/{{ .Values.zeekEth0.zeeConfigName }}
              subPath: {{ .Values.zeekEth0.zeeConfigName }}

            - name: iface-data
              mountPath: /shared

      volumes:
        - name: zeek-logs
          emptyDir: {}

        - name: config-volume
          configMap:
            name: zeek-config

        - name: filebeat-config
          configMap:
            name: filebeat-config

        - name: filebeat-modules
          configMap:
            name: filebeat-modules

        - name: iface-data
          emptyDir: {}
