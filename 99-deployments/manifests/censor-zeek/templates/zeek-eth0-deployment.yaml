apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.zeekEth0.fullnameOverride }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zeek
  template:
    metadata:
      labels:
        app: zeek
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      containers:
        # ======================
        # Filebeat sidecar
        # ======================
        - name: filebeat
          image: docker.elastic.co/beats/filebeat:8.12.0
          imagePullPolicy: IfNotPresent

          args:
            - "-e"
            - "-c"
            - "/usr/share/filebeat/filebeat.yml"

          env:
            - name: DUMMY
              value: "{{ .Values.zeekEth0.dummyVar }}"

          securityContext:
            runAsUser: 0

          volumeMounts:
            - name: zeek-logs
              mountPath: {{ .Values.zeekEth0.logDir }}
              readOnly: true

            - name: filebeat-config
              mountPath: /usr/share/filebeat/filebeat.yml
              subPath: filebeat.yml

            - name: filebeat-modules
              mountPath: /usr/share/filebeat/modules.d
              readOnly: true

        ##### Zeek #####
        - name: zeek
          image: zeek/zeek:8.0.4
          imagePullPolicy: IfNotPresent

          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_RAW
                - NET_ADMIN
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -e
              export ZEEK_LOG_DIR={{ .Values.zeekEth0.logDir }}/current
              mkdir -p $ZEEK_LOG_DIR
              echo "Log dir = $ZEEK_LOG_DIR"
              zeek -i {{ .Values.zeekEth0.interfaceName }} -C local /etc/zeek/site/{{ .Values.zeekEth0.zeeConfigName }}

          resources:
            requests:
              cpu: {{ .Values.zeekEth0.resources.requests.cpu }}
              memory: {{ .Values.zeekEth0.resources.requests.memory }}
            limits:
              cpu: {{ .Values.zeekEth0.resources.limits.cpu }}
              memory: {{ .Values.zeekEth0.resources.limits.memory }}

          volumeMounts:
            - name: zeek-logs
              mountPath: {{ .Values.zeekEth0.logDir }}

            - name: config-volume
              mountPath: /etc/zeek/site/{{ .Values.zeekEth0.zeeConfigName }}
              subPath: {{ .Values.zeekEth0.zeeConfigName }}

      volumes:
        - name: zeek-logs
          emptyDir: {}

        - name: config-volume
          configMap:
            name: zeek-config

        - name: filebeat-config
          configMap:
            name: filebeat-config

        - name: filebeat-modules
          configMap:
            name: filebeat-modules
