apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
data:
  filebeat.yml: |
    filebeat.config.modules:
      path: /usr/share/filebeat/modules.d/*.yml
      reload.enabled: false

    logging.level: info
    logging.to_files: true
    logging.files:
      path: /var/log/filebeat
      name: filebeat.log
      keepfiles: 7
      permissions: 0644

    output.logstash:
      hosts: ["{{ .Values.zeekEth0.logstash.host }}:{{ .Values.zeekEth0.logstash.port }}"]
