logstash-dispatcher-redis:
  enabled: true
  antiAffinity: soft

  fullnameOverride: logstash-dispatcher-redis
  replicas: 1
  image: asia-southeast1-docker.pkg.dev/its-artifact-commons/utils/logstash
  imageTag: v8.15.1-3
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "3"
      memory: "2Gi"

  livenessProbe:
    httpGet: null
    exec:
      command:
        - /bin/sh
        - -c
        - |
          CURR=$(curl -sf -m 5 http://localhost:9600/_node/stats/pipelines/main | /usr/share/logstash/bin/ruby -rjson -e 'print JSON.parse(STDIN.read)["events"]["in"]' 2>/dev/null)
          if [ -z "$CURR" ]; then echo "cannot reach logstash API"; exit 1; fi
          STATE=/tmp/.pipeline_liveness
          PREV=$(cat "$STATE.count" 2>/dev/null || echo -1)
          echo "$CURR" > "$STATE.count"
          NOW=$(date +%s)
          if [ "$CURR" != "$PREV" ]; then
            echo "$NOW" > "$STATE.since"
            exit 0
          fi
          SINCE=$(cat "$STATE.since" 2>/dev/null || echo "$NOW")
          STALL=$((NOW - SINCE))
          if [ "$STALL" -gt 300 ]; then
            echo "pipeline stalled ${STALL}s, events.in stuck at $CURR"
            exit 1
          fi
          exit 0
    initialDelaySeconds: 180
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 1
    successThreshold: 1

  service:
    type: ClusterIP
    ports:
    - port: 9198
      protocol: TCP
      targetPort: 9198
      name: metrics

  extraContainers:
    - name: logstash-exporter
      image: bonniernews/logstash_exporter:latest
      args:
        - "--logstash.endpoint=http://localhost:9600"
      ports:
        - name: metrics
          containerPort: 9198

  extraEnvs:
    - name: REDIS_ETL_HOST
      value: "redis-etl-master.redis-etl.svc.cluster.local"

    - name: ES_USER
      valueFrom:
        secretKeyRef:
          name: es-basic-authen
          key: username

    - name: ES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: es-basic-authen
          key: password

    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name

  logstashJavaOpts: "-Xms1g -Xmx1g"

  logstashConfig:
    logstash.yml: |
      http.host: "0.0.0.0"
      pipeline.ecs_compatibility: "disabled"
      http.port: 9600
      pipeline.workers: 1 # shared Redis client, not thread-safe — scale via replicas, not workers

  extraVolumeMounts:
    - name: scripts
      mountPath: /scripts/
      readOnly: true

  extraVolumes:
    - name: scripts
      configMap:
        name: dispatcher-cm

  logstashPipeline:
    logstash.conf: |
      input {
        generator {
          count => 0
        }
      }

      filter {
        ruby {
          init => '
            require "redis"
            require "json"

            IN_STREAM = "transformed-topic-beat"
            IN_GROUP  = "for-dispatcher-es"
            CONSUMER  = "dispatcher-es-#{ENV["POD_NAME"]}"

            def connect_with_retry(host, port)
              attempt = 0
              begin
                r = Redis.new(host: host, port: port, timeout: 5, reconnect_attempts: 1)
                r.ping
                r
              rescue Redis::BaseConnectionError => e
                attempt += 1
                if attempt >= 30
                  STDOUT.puts("ERROR dispatcher: Redis unreachable after #{attempt} attempts (#{e.message}), failing")
                  raise
                end
                wait = [2 ** [attempt, 6].min, 30].min
                STDOUT.puts("WARN dispatcher: Redis connect failed (#{e.message}), retry in #{wait}s (#{attempt}/30)")
                sleep wait
                retry
              end
            end

            $r_in = connect_with_retry(ENV["REDIS_ETL_HOST"], 6379)
            begin
              $r_in.xgroup(:create, IN_STREAM, IN_GROUP, "$", mkstream: true)
            rescue Redis::CommandError => e
              raise e unless e.message.include?("BUSYGROUP")
            rescue Redis::BaseConnectionError => e
              STDOUT.puts("WARN dispatcher: xgroup create failed (#{e.message}), retrying")
              sleep 2
              retry
            end
          '
          code => '
            begin
              entries = $r_in.xreadgroup(IN_GROUP, CONSUMER, IN_STREAM, ">", count: 1, block: 1000)
              if entries && entries[IN_STREAM] && !entries[IN_STREAM].empty?
                id, fields = entries[IN_STREAM].first
                new_ev = LogStash::Event.new(JSON.parse(fields["data"]))
                event.overwrite(new_ev)
                $r_in.xack(IN_STREAM, IN_GROUP, id)
              else
                event.cancel
              end
            rescue Redis::BaseConnectionError => e
              STDOUT.puts("WARN dispatcher: Redis unavailable, skipping tick (#{e.message})")
              sleep 1
              event.cancel
            end
          '
        }

        if ![@metadata][cancelled] {
          ruby {
            path => "/scripts/dispatcher.rb"
            script_params => {}
          }
        }
      }

      output {
        if [cust_ts_yyyy] {
          elasticsearch {
            hosts => ["https://es-censor-es-http.elasticsearch.svc.cluster.local:9200"]
            ssl_certificate_verification => false
            user => "${ES_USER}"
            password => "${ES_PASSWORD}"
            action => "create"
            ecs_compatibility => "v8"
            http_compression => "true"
            index => "censor-events-redis-%{[cust_ts_yyyy]}%{[cust_ts_mm]}%{[cust_ts_dd]}-%{[cust_pod_name_dispatcher]}"
            template_overwrite => "true"
            timeout => "0.5"
            ilm_enabled => false
          }
        }
      }
