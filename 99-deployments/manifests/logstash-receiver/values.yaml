
logstash-beat-receiver:
  enabled: true
  antiAffinity: soft

  fullnameOverride: logstash-beat-receiver
  replicas: 2
  image: asia-southeast1-docker.pkg.dev/its-artifact-commons/utils/logstash
  imageTag: v8.15.1-3
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

  extraEnvs:
    - name: LS_JAVA_OPTS
      value: "-Xmx2g -Xms2g"

    - name: DUMMY
      value: "000"

    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name

  logstashConfig:
    logstash.yml: |
      http.host: "0.0.0.0"
      http.port: 9600
      pipeline.ecs_compatibility: "disabled"

  extraVolumeMounts:
    - name: scripts
      mountPath: /scripts/
      readOnly: true

  extraVolumes:
    - name: scripts
      configMap:
        name: receiver-beat-cm

  service:
    type: NodePort
    ports:
    - port: 5044
      protocol: TCP
      targetPort: 5044
      nodePort: 30044
      name: beat-tcp

    - port: 9198
      protocol: TCP
      targetPort: 9198
      name: metrics

  extraContainers:
    - name: logstash-exporter
      image: bonniernews/logstash_exporter:latest
      args:
        - "--logstash.endpoint=http://localhost:9600"
      ports:
        - name: metrics
          containerPort: 9198

  logstashPipeline:
    logstash.conf: |
      input {
        beats {
          port => 5044
        }
      }

      filter {
          ruby {
            path => "/scripts/receiver-beat.rb"
            script_params => {}
          }
      }

      output {
        #stdout { codec => json_lines }

        kafka {
          bootstrap_servers => "kafka.kafka.svc.cluster.local:9092"
          codec => json
          topic_id => "received-topic-beat"
        }
      }

