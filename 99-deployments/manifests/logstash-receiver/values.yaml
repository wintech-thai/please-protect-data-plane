
logstash-beat-receiver:
  enabled: true
  antiAffinity: soft

  fullnameOverride: logstash-beat-receiver
  replicas: 1
  image: asia-southeast1-docker.pkg.dev/its-artifact-commons/utils/logstash
  imageTag: v8.15.1-3
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "6Gi"

  extraEnvs:
    - name: DUMMY
      value: "0001"

    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name

  logstashJavaOpts: "-Xms2g -Xmx2g"
  logstashConfig:
    logstash.yml: |
      http.host: "0.0.0.0"
      http.port: 9600
      pipeline.ecs_compatibility: "disabled"

  extraVolumeMounts:
    - name: scripts
      mountPath: /scripts/
      readOnly: true
      
    - name: geoip-db
      mountPath: /tmp/geoip

  extraVolumes:
    - name: scripts
      configMap:
        name: receiver-beat-cm

    - name: geoip-db
      emptyDir: {}
  #
  # Download mmdb before logstash starts
  #
  extraInitContainers:
    - name: download-geoip
      image: curlimages/curl:8.8.0
      command:
        - sh
        - -c
        - |
          echo "Downloading GeoLite2-City.mmdb..."

          curl -L \
            -o /tmp/geoip/GeoLite2-City.mmdb \
            http://geoip-sync.pp-system.svc.cluster.local/GeoLite2-City.mmdb

          ls -lh /tmp/geoip/

      volumeMounts:
        - name: geoip-db
          mountPath: /tmp/geoip

  service:
    type: NodePort
    ports:
    - port: 5044
      protocol: TCP
      targetPort: 5044
      nodePort: 30044
      name: beat-tcp

    - port: 9198
      protocol: TCP
      targetPort: 9198
      name: metrics

  extraContainers:
    - name: logstash-exporter
      image: bonniernews/logstash_exporter:latest
      args:
        - "--logstash.endpoint=http://localhost:9600"
      ports:
        - name: metrics
          containerPort: 9198

  logstashPipeline:
    logstash.conf: |
      input {
        beats {
          port => 5044
        }
      }

      filter {
          ruby {
            path => "/scripts/receiver-beat.rb"
            script_params => {}
          }

          if [network][direction] == "outbound" {
            geoip {
              source => "[destination][ip]"
              target => "[destination][geoip]"
              database => "/tmp/geoip/GeoLite2-City.mmdb"
            }
          }

          if [network][direction] == "external" {
            geoip {
              source => "[source][ip]"
              target => "[source][geoip]"
              database => "/tmp/geoip/GeoLite2-City.mmdb"
            }
          }
      }

      output {
        #stdout { codec => json_lines }

        kafka {
          bootstrap_servers => "kafka.kafka.svc.cluster.local:9092"
          codec => json
          topic_id => "received-topic-beat"
        }
      }
