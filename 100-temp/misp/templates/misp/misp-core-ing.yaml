{{- if .Values.misp.enabled }}

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: misp-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-set-headers: "X-Forwarded-Proto=https"
spec:
  tls:
  - hosts:
    - {{ .Values.domain }} # misp.rtarf-censor.dev-hubs.com
    #secretName: cloudflare-tls-secret
  rules:
  - host: {{ .Values.domain }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: misp-core-service
            port:
              number: 80

{{- end }}